# Drop chances configuration. You can add your own blocks here.
#
# blocks:
#   ANY_UNIQUE_NAME:
#     enabled: <true|false>  | Is this listener active?
#     type: ...              | List of blocks affected by this chance.
#     chance: 1-100          | Drop probability percentage.
#     gui_material: material | Item icon to display in the settings menu.
#
blocks:
  netherite:
    enabled: true
    type:
      - ANCIENT_DEBRIS
    chance: 3
    gui_material: NETHERITE_SCRAP
  diamond:
    enabled: true
    type:
      - DIAMOND_ORE
      - DEEPSLATE_DIAMOND_ORE
    chance: 15
    gui_material: DIAMOND
  emerald:
    enabled: true
    type:
      - EMERALD_ORE
      - DEEPSLATE_EMERALD_ORE
    chance: 10
    gui_material: EMERALD
  gold:
    enabled: true
    type:
      - GOLD_ORE
      - DEEPSLATE_GOLD_ORE
      - NETHER_GOLD_ORE
    chance: 20
    gui_material: RAW_GOLD
  iron:
    enabled: true
    type:
      - IRON_ORE
      - DEEPSLATE_IRON_ORE
    chance: 30
    gui_material: RAW_IRON
  lapis:
    enabled: true
    type:
      - LAPIS_ORE
      - DEEPSLATE_LAPIS_ORE
    chance: 25
    gui_material: LAPIS_LAZULI
  coal:
    enabled: true
    type:
      - COAL_ORE
      - DEEPSLATE_COAL_ORE
    chance: 45
    gui_material: COAL
  quartz:
    enabled: true
    type:
      - NETHER_QUARTZ_ORE
    chance: 35
    gui_material: QUARTZ

# Actions triggered on luck/unluck events.
# Available actions:
## [MESSAGE] <text> - Send a private message.
## [SOUND] <sound> <?volume> <?pitch> - Play a sound effect.
## [BROADCAST] <text> - Send a message to all players.
## [TITLE] <title>;<subtitle>;<?fadeIn>;<?stay>;<?fadeOut> - Show on-screen title.
## [ACTIONBAR] <text> - Show a message above the hotbar.
#
# Available placeholders:
## <item> - Name of the dropped item.
## <chance> - Current "random" roll value.
actions:
  luck:
    - '[ACTIONBAR] <gradient:#C0FF58:#98FF08><b>LUCKY!</b></gradient> <gray>You found: <white><item>'
    - '[SOUND] ENTITY_PLAYER_LEVELUP 0.5 1.2'
  unlucky:
    - '[ACTIONBAR] <#FF5858>Unlucky... <dark_gray>(chance was <chance>%)'
    - '[SOUND] BLOCK_NOTE_BLOCK_BASS 0.8 0.5'

# This plugin only supports MiniMessage formatting (<green>, <#rrggbb>, <gradient>, etc.).
# Legacy formatting (&a, &#rrggbb) is NOT supported.
# Prefix placeholder: <prefix>
# Learn more about MiniMessage: https://docs.papermc.io/adventure/minimessage/format/
messages:
  prefix: '<gradient:#C0FF58:#98FF08>ULC</gradient> <dark_gray>»<#FCFCFC>'
  errors:
    no_perms: '<prefix> <red>You do not have permission to run this!'
    only_players: '<prefix> <red>This command can only be used by the player.'
  commands:
    about:
      - ' '
      - ' <gradient:#C0FF58:#98FF08>Unlucky</gradient><gradient:#FF588E:#FF0876>Craft</gradient>'
      - ' <gray>Version: <#98FF08><version> <dark_gray>| <gray>Contributors: <hover:show_text:"<yellow><contributors>"><#FF0876>[HOVER]</hover>'
      - ' '
      - ' <aqua>Commands:'
      - ' <yellow>/ulc <about|help> <gray>| <gold>About the plugin/Help'
      - ' <yellow>/ulc reload <gray>| <gold>Reload the plugin'
      - ' <yellow>/ulc gui <gray>| <gold>Open settings GUI'
      - ' '
    reloaded: '<prefix> <green>Plugin reloaded!'
  gui:
    title: '               <black>ᴄʜᴀɴᴄᴇs'
    lore:
      - '<yellow>Chance: <chance>'
      - "<gray>Left Click: <white>+0.05"
      - "<gray>Right click: &f-0.05"